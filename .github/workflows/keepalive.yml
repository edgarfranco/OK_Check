name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *' # Se ejecuta una vez al mes

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v1 # Reactiva el repositorio automáticamente
