name: OK Video Status Checker

on:
  schedule:
    # Se ejecuta cada hora (puedes ajustarlo)
    - cron: '5 */1 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  check-videos:
    runs-on: ubuntu-latest

    # Inyectamos los secretos de GitHub como variables de entorno
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar el entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip' # Acelera las ejecuciones guardando las librerías

      - name: 3. Instalar librerías necesarias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Ejecutar el script de verificación
        run: python -u ok_check.py

      - name: 5. Guardar Logs en caso de error o éxito
        if: always() # Se ejecuta aunque el script falle
        uses: actions/upload-artifact@v4
        with:
          name: reporte-ejecucion
          path: OK_Check.log
          retention-days: 5
